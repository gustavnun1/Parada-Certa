# =============================================
# Configuracoes do SQL Server
# Ajuste os valores abaixo para o seu ambiente
# =============================================
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=ParadaCerta;encrypt=false;trustServerCertificate=true
spring.datasource.username=AdmParadaCerta
spring.datasource.password=sa
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA / Hibernate
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Porta da API (o Android vai chamar esta porta)
server.port=8080

# Permite chamadas de qualquer origem (necessario para o app Android)
spring.web.cors.allowed-origins=*

# Log
logging.level.com.paradacerta=DEBUG
logging.level.org.springframework.web=INFO

# =============================================
# Configuracoes de E-mail (Gmail SMTP)
#   MAIL_USERNAME  -> seu Gmail (ex: paradacerta@gmail.com)
#   MAIL_PASSWORD  -> Senha de app do Google (nao a senha normal)
#   Para gerar: conta Google > Seguranca > Verificacao em 2 etapas > Senhas de app
# =============================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# =============================================
# Chave PIX da empresa (Parada Certa)
# Nunca colocar diretamente no app Android — deve vir do backend
# =============================================
empresa.pix-key=${EMPRESA_PIX_KEY:}

# =============================================
# Moderacao de Conteudo (OpenAI Moderation API)
# Sem a chave configurada, comentarios sao aceitos sem verificacao.
# =============================================
moderation.openai.api-key=${OPENAI_MODERATION_KEY:}