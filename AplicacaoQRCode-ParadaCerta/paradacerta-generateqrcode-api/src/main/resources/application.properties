# ============================================================
# Parada Certa API — Configurações de conexão com SQL Server
# Ajuste usuario, senha e host conforme o seu ambiente
# ============================================================

# Conexão com SQL Server
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=ParadaCerta;encrypt=false;trustServerCertificate=true
spring.datasource.username=AdmParadaCerta
spring.datasource.password=sa
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Servidor (porta do Spring Boot)
server.port=8080
