<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login do Estacionamento - Parada Certa</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-[#071426] text-white flex items-center justify-center px-4">

  <div class="w-full max-w-md bg-[#0d1b31] border border-slate-800 rounded-3xl p-8 shadow-2xl">
    
    <div class="flex flex-col items-center mb-8">
      <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-blue-500 to-cyan-500 flex items-center justify-center shadow-lg mb-4">
        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M3 21h18M5 21V7l8-4 6 3v15M9 9h1m-1 4h1m4-4h1m-1 4h1"/>
        </svg>
      </div>

      <h1 class="text-3xl font-bold text-center">
        Login do <span class="text-blue-400">Estacionamento</span>
      </h1>

      <p class="text-slate-400 text-center mt-3">
        Acesse o painel para gerenciar vagas, preços e relatórios.
      </p>
    </div>

    <form class="space-y-5">
      <div>
        <label class="block mb-2 text-sm font-medium">E-mail corporativo</label>
        <input
          type="email"
          placeholder="Digite seu e-mail"
          class="w-full px-4 py-3 rounded-xl bg-slate-800 border border-slate-700 text-white outline-none focus:border-blue-400"
        >
      </div>

      <div>
        <label class="block mb-2 text-sm font-medium">Senha</label>
        <input
          type="password"
          placeholder="Digite sua senha"
          class="w-full px-4 py-3 rounded-xl bg-slate-800 border border-slate-700 text-white outline-none focus:border-blue-400"
        >
      </div>

      <button
        type="button"
        onclick="window.location.href='admin-dashboard.html'"
        class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl transition"
      >
        Entrar no painel
      </button>
    </form>

    <p class="text-center text-sm text-slate-400 mt-6">
      Área destinada ao administrador do estacionamento
    </p>

    <p class="text-center mt-4">
      <a href="escolha-login.html" class="text-slate-400 hover:text-white text-sm">
        ← Voltar para escolha de acesso
      </a>
    </p>

  </div>

</body>
</html>
