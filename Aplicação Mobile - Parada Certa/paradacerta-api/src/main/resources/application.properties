# =============================================
# Configuracoes do SQL Server
# Ajuste os valores abaixo para o seu ambiente
# =============================================
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=ParadaCerta;encrypt=false;trustServerCertificate=true
spring.datasource.username=AdmParadaCerta
spring.datasource.password=sa
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA / Hibernate
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Porta da API (o Android vai chamar esta porta)
server.port=8080

# Permite chamadas de qualquer origem (necessario para o app Android)
spring.web.cors.allowed-origins=*

# Log
logging.level.com.paradacerta=DEBUG
logging.level.org.springframework.web=INFO