<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gerenciamento de Usuários - Parada Certa</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #081221;
      color: white;
      margin: 0;
      padding: 30px;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
      color: #4ade80;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      background: #0f172a;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      background: #111827;
    }

    th, td {
      border: 1px solid #334155;
      padding: 12px;
      text-align: center;
    }

    th {
      background: #1e293b;
      color: #4ade80;
    }

    button {
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin: 2px;
      font-weight: bold;
    }

    .btn-editar {
      background: #facc15;
      color: black;
    }

    .btn-excluir {
      background: #ef4444;
      color: white;
    }

    .btn-salvar {
      background: #22c55e;
      color: white;
      width: 100%;
      margin-top: 10px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      margin-bottom: 12px;
      border-radius: 6px;
      border: 1px solid #475569;
      background: #0b1220;
      color: white;
      box-sizing: border-box;
    }

    .form-box {
      margin-top: 30px;
      padding: 20px;
      background: #111827;
      border-radius: 12px;
    }

    .hidden {
      display: none;
    }

    .voltar {
      display: inline-block;
      margin-bottom: 20px;
      color: #93c5fd;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <a class="voltar" href="index.html">← Voltar</a>
    <h1>Gerenciamento de Usuários</h1>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Nome</th>
          <th>Email</th>
          <th>Senha</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="tabelaUsuarios"></tbody>
    </table>

    <div class="form-box hidden" id="formEditarBox">
      <h2>Editar Usuário</h2>

      <input type="hidden" id="editId" />
      <label>Nome</label>
      <input type="text" id="editNome" />

      <label>Email</label>
      <input type="email" id="editEmail" />

      <label>Senha</label>
      <input type="text" id="editSenha" placeholder="Digite nova senha ou deixe vazio para manter" />

      <button class="btn-salvar" onclick="salvarEdicao()">Salvar Alterações</button>
    </div>
  </div>

  <script>
    const api = "http://localhost:3000/usuarios";

    async function carregarUsuarios() {
      try {
        const resposta = await fetch(api);
        const usuarios = await resposta.json();

        const tabela = document.getElementById("tabelaUsuarios");
        tabela.innerHTML = "";

        usuarios.forEach(usuario => {
          tabela.innerHTML += `
            <tr>
              <td>${usuario.id}</td>
              <td>${usuario.nome}</td>
              <td>${usuario.email}</td>
              <td>${usuario.senha}</td>
              <td>
                <button class="btn-editar" onclick='abrirEdicao(${JSON.stringify(usuario)})'>Editar</button>
                <button class="btn-excluir" onclick='excluirUsuario(${usuario.id})'>Excluir</button>
              </td>
            </tr>
          `;
        });
      } catch (erro) {
        console.error("Erro ao carregar usuários:", erro);
        alert("Erro ao carregar usuários");
      }
    }

    function abrirEdicao(usuario) {
      document.getElementById("formEditarBox").classList.remove("hidden");
      document.getElementById("editId").value = usuario.id;
      document.getElementById("editNome").value = usuario.nome;
      document.getElementById("editEmail").value = usuario.email;
      document.getElementById("editSenha").value = "";
    }

    async function salvarEdicao() {
      const id = document.getElementById("editId").value;
      const nome = document.getElementById("editNome").value;
      const email = document.getElementById("editEmail").value;
      const senha = document.getElementById("editSenha").value;

      try {
        const resposta = await fetch(`${api}/${id}`, {
          method: "PUT",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ nome, email, senha })
        });

        const dados = await resposta.json();

        if (!resposta.ok) {
          alert(dados.erro || "Erro ao atualizar usuário");
          return;
        }

        alert(dados.mensagem);
        document.getElementById("formEditarBox").classList.add("hidden");
        carregarUsuarios();
      } catch (erro) {
        console.error("Erro ao atualizar:", erro);
        alert("Erro ao atualizar usuário");
      }
    }

    async function excluirUsuario(id) {
      const confirmar = confirm("Tem certeza que deseja excluir este usuário?");
      if (!confirmar) return;

      try {
        const resposta = await fetch(`${api}/${id}`, {
          method: "DELETE"
        });

        const dados = await resposta.json();

        if (!resposta.ok) {
          alert(dados.erro || "Erro ao excluir usuário");
          return;
        }

        alert(dados.mensagem);
        carregarUsuarios();
      } catch (erro) {
        console.error("Erro ao excluir:", erro);
        alert("Erro ao excluir usuário");
      }
    }

    carregarUsuarios();
  </script>
</body>
</html>
