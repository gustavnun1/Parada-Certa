<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Escolha de Acesso - Parada Certa</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-[#071426] text-white flex items-center justify-center px-4">

  <div class="w-full max-w-4xl">
    
    <div class="text-center mb-10">
      <h1 class="text-4xl font-bold mb-3">
        Parada<span class="text-green-400">Certa</span>
      </h1>
      <p class="text-slate-400 text-lg">
        Escolha como deseja acessar o sistema
      </p>
    </div>

    <div class="grid md:grid-cols-2 gap-8">

      <!-- Motorista -->
      <div class="bg-[#0d1b31] border border-slate-800 rounded-3xl p-8 shadow-2xl">
        <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-blue-500 to-green-400 flex items-center justify-center mb-6">
          <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M9 17h6m-6 0a2 2 0 01-2-2V9a2 2 0 012-2h6a2 2 0 012 2v6a2 2 0 01-2 2m-6 0l-2 3m8-3l2 3M7 10h10"/>
          </svg>
        </div>

        <h2 class="text-2xl font-bold mb-3">Sou Motorista</h2>
        <p class="text-slate-400 mb-6">
          Reserve vagas, realize pagamentos e acompanhe suas reservas.
        </p>

        <button
          onclick="window.location.href='login-motorista.html'"
          class="w-full bg-green-500 hover:bg-green-400 text-slate-950 font-bold py-3 rounded-xl transition"
        >
          Entrar como Motorista
        </button>
      </div>

      <!-- Estacionamento -->
      <div class="bg-[#0d1b31] border border-slate-800 rounded-3xl p-8 shadow-2xl">
        <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-blue-500 to-green-400 flex items-center justify-center mb-6">
          <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M3 21h18M5 21V7l8-4 6 3v15M9 9h1m-1 4h1m4-4h1m-1 4h1"/>
          </svg>
        </div>

        <h2 class="text-2xl font-bold mb-3">Sou Estacionamento</h2>
        <p class="text-slate-400 mb-6">
          Gerencie vagas, preços, relatórios e configurações da conta.
        </p>

        <button
          onclick="window.location.href='login-admin.html'"
          class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl transition"
        >
          Entrar como Estacionamento
        </button>
      </div>

    </div>

    <div class="text-center mt-8">
      <a href="index.html" class="text-slate-400 hover:text-white transition">
        ← Voltar para a página inicial
      </a>
    </div>

  </div>

</body>
</html>
