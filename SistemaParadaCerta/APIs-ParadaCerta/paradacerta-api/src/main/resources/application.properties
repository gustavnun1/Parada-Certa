# =============================================
# Configuracoes do SQL Server
# Valores sensiveis devem vir de variaveis de ambiente ou do .env local
# =============================================
spring.config.import=optional:file:.env[.properties],optional:file:../.env[.properties],optional:file:../../.env[.properties],optional:file:../../../.env[.properties]

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA / Hibernate
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Porta da API (o Android vai chamar esta porta)
server.port=${PORT:8080}

# CORS: regras finas definidas em com.paradacerta.api.controller.WebConfig
# (painel web aceito so em http://localhost:5500 / 127.0.0.1:5500; mobile nao usa CORS).

# Log
logging.level.com.paradacerta=DEBUG
logging.level.org.springframework.web=INFO

# =============================================
# Configuracoes de E-mail (Gmail SMTP)
#   MAIL_USERNAME  -> seu Gmail (ex: paradacerta@gmail.com)
#   MAIL_PASSWORD  -> Senha de app do Google (nao a senha normal)
#   Para gerar: conta Google > Seguranca > Verificacao em 2 etapas > Senhas de app
# =============================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# =============================================
# Chave PIX da empresa (Parada Certa)
# Nunca colocar diretamente no app Android deve vir do backend
# =============================================
empresa.pix-key=${EMPRESA_PIX_KEY:}

# =============================================
# Moderacao de Conteudo (OpenAI Moderation API)
# Sem a chave configurada, comentarios sao aceitos sem verificacao de IA.
# =============================================
moderation.openai.api-key=${OPENAI_MODERATION_KEY:}

# =============================================
# Parametro do TCC: taxa cobrada pela plataforma sobre cada pagamento.
# Aplicada em runtime nos endpoints de /api/financeiro (calculo de receita liquida).
# 0.05 = 5%. Pode ser sobrescrito via variavel de ambiente PARADACERTA_TAXA_PLATAFORMA.
# =============================================
paradacerta.taxa-plataforma=${PARADACERTA_TAXA_PLATAFORMA:0.05}

# =============================================
# Upload de fotos do estacionamento (Item 3 - backlog 2026.5)
# - Tamanho maximo por arquivo: 5 MB (validado tambem no FotoValidatorService).
# - Diretorio destino: relativo ao processo (default ./uploads).
# =============================================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB
paradacerta.uploads.dir=${PARADACERTA_UPLOADS_DIR:./uploads}

# =============================================
# Google Vision SafeSearch (moderacao de imagem)
# Configure com a chave da Google Cloud para ativar a moderacao por IA.
# Se vazio, as imagens passam pela validacao local (extensao, MIME, magic bytes,
# tamanho) mas a moderacao por IA fica desligada (modo TCC/dev) — gera WARN.
# =============================================
paradacerta.gcp.vision.api-key=${GCP_VISION_API_KEY:}
